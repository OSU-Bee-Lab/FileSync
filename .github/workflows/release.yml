name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to rebuild (e.g. v0.1.0)'
        required: true

env:
  APP_NAME: FileSync
  APP_ID: com.osubeelab.filesync

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: darwin
          - platform: ubuntu-22.04
            os: linux
          - platform: windows-latest
            os: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Install MinGW (cgo compiler for Windows)
        if: matrix.os == 'windows'
        # Pinned to a commit past the v2 tag: v2 still has a "static
        # workaround" step that deletes libpthread.dll.a, which the current
        # chocolatey mingw package no longer ships, failing the job. Fixed
        # upstream on the default branch but never re-tagged as v2.
        uses: egor-tensin/setup-mingw@0ea9f5370e9405e1b4cc436a2668226b02450eb2
        with:
          platform: x64

      - name: Install fyne packaging tool
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Package (macOS)
        if: matrix.os == 'darwin'
        run: |
          fyne package -os darwin -icon Icon.png -name "$APP_NAME" -appID "$APP_ID"
          codesign --force --deep --sign - "$APP_NAME.app"
          ditto -c -k --keepParent --sequesterRsrc "$APP_NAME.app" "$APP_NAME-macOS.zip"

      - name: Package (Linux)
        if: matrix.os == 'linux'
        run: |
          fyne package -os linux -icon Icon.png -name "$APP_NAME" -appID "$APP_ID"
          mv "$APP_NAME.tar.xz" "$APP_NAME-Linux.tar.xz"

      - name: Package (Linux .deb)
        if: matrix.os == 'linux'
        run: |
          extract_dir="$(mktemp -d)"
          tar -xJf "$APP_NAME-Linux.tar.xz" -C "$extract_dir"

          pkg_root="$(mktemp -d)/filesync"
          mkdir -p "$pkg_root/DEBIAN" "$pkg_root/usr/bin" \
            "$pkg_root/usr/share/applications" "$pkg_root/usr/share/pixmaps"
          cp "$extract_dir/filesync/usr/local/bin/filesync" "$pkg_root/usr/bin/filesync"
          cp "$extract_dir/filesync/usr/local/share/applications/$APP_NAME.desktop" \
            "$pkg_root/usr/share/applications/$APP_NAME.desktop"
          cp "$extract_dir/filesync/usr/local/share/pixmaps/$APP_NAME.png" \
            "$pkg_root/usr/share/pixmaps/$APP_NAME.png"

          # Derive Depends from the actual shared libraries the binary links
          # against, mapped back to the Ubuntu packages that provide them, so
          # `apt install ./FileSync-Linux.deb` resolves runtime deps itself.
          deps="$(ldd "$pkg_root/usr/bin/filesync" \
            | awk '{print $3}' | grep '^/' | sort -u \
            | xargs -r dpkg -S 2>/dev/null \
            | cut -d: -f1 | sort -u | paste -sd, -)"

          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"

          printf 'Package: filesync\n' > "$pkg_root/DEBIAN/control"
          printf 'Version: %s\n' "${version:-0.0.0}" >> "$pkg_root/DEBIAN/control"
          printf 'Section: utils\n' >> "$pkg_root/DEBIAN/control"
          printf 'Priority: optional\n' >> "$pkg_root/DEBIAN/control"
          printf 'Architecture: amd64\n' >> "$pkg_root/DEBIAN/control"
          printf 'Depends: %s\n' "$deps" >> "$pkg_root/DEBIAN/control"
          printf 'Maintainer: OSU Bee Lab\n' >> "$pkg_root/DEBIAN/control"
          printf 'Description: Sync bioacoustics experiment data between local folders and cloud remotes\n' >> "$pkg_root/DEBIAN/control"

          dpkg-deb --build --root-owner-group "$pkg_root" "$APP_NAME-Linux.deb"

      - name: Verify .deb installs cleanly
        if: matrix.os == 'linux'
        run: |
          docker run --rm -v "$PWD:/work" -w /work ubuntu:22.04 bash -c \
            "apt-get update -qq && apt-get install -y -qq ./$APP_NAME-Linux.deb"

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          fyne package -os windows -icon Icon.png -name "$APP_NAME" -appID "$APP_ID"
          mv "$APP_NAME.exe" "$APP_NAME-Windows.exe"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ env.APP_NAME }} ${{ inputs.tag || github.ref_name }}
          draft: true
          prerelease: false
          files: |
            ${{ env.APP_NAME }}-macOS.zip
            ${{ env.APP_NAME }}-Linux.tar.xz
            ${{ env.APP_NAME }}-Linux.deb
            ${{ env.APP_NAME }}-Windows.exe
